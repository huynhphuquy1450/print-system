name: CI

on: [push, pull_request]

jobs:
  server-syntax:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci --omit=dev
      - name: Syntax check all .js files
        run: |
          echo "=== Checking src/**/*.js ==="
          find src -name "*.js" -print -exec node --check {} \;
          echo "=== Checking scripts/**/*.js ==="
          find scripts -name "*.js" -print -exec node --check {} \;
      - name: Verify package.json valid
        run: node -e "console.log(require('./package.json').name)"

  agent-syntax:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci --omit=dev
      - name: Syntax check agent.js
        run: node --check agent.js
      - name: Verify package.json valid
        run: node -e "console.log(require('./package.json').name)"

  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            agent/package-lock.json
      - name: Install root dev deps
        run: npm ci
      - name: Lint monorepo
        run: npm run lint

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for known secret patterns
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          # Loại trừ file test: fixture thường chứa cert/key GIẢ khớp pattern (vd chuỗi
          # "BEGIN CERTIFICATE" trong https-server.test.js) → false positive. Secret thật
          # không nằm trong test.
          if grep -rE "IwALxuEKX|05e91dd52e|089add841|77842914e7b390a|81aef7023a310693|a7644c8cf5f9bbee|MIIDDjCC|BEGIN CERTIFICATE" \
             --include="*.md" --include="*.js" --include="*.ps1" --include="*.sh" \
             --exclude="*.test.js" --exclude-dir="__tests__" --exclude-dir="node_modules" . ; then
            echo "ERROR: Found potential secrets in committed files"
            exit 1
          fi
          echo "=== No secrets found ==="

  governance-check:
    name: Governance files present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required governance files
        run: |
          for f in ROADMAP.md CONTRIBUTING.md CODE_OF_CONDUCT.md \
                   .github/ISSUE_TEMPLATE/bug_report.md \
                   .github/ISSUE_TEMPLATE/feature_request.md \
                   .github/PULL_REQUEST_TEMPLATE.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          echo "All governance files present"

  markdown-link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal markdown links
        run: |
          fail=0
          while IFS= read -r f; do
            dir=$(dirname "$f")
            grep -oE '\]\(\.\.?/[^)]+\.md[^)]*\)' "$f" 2>/dev/null | sed 's/^(//;s/)$//' | while read link; do
              link="${link%#*}"
              target="$dir/$link"
              if [ ! -f "$target" ]; then
                echo "::warning::Broken link in $f: $link (target: $target)"
                fail=1
              fi
            done
          done < <(find . -name '*.md' -not -path '*/node_modules/*' -not -path './node_modules/*')
          if [ "$fail" = "1" ]; then
            echo "::warning::Some links broken (see above). Fix or update ROADMAP.md."
          fi

  server-test:
    name: Server unit tests (jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies (with dev deps for jest)
        run: npm ci
      - name: Run jest
        # Tests use jest.setup.js to inject dummy env vars (no real secrets needed)
        run: npm test